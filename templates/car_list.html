{% extends 'base.html' %}
{% block content %}
  <h1>Наши автомобили</h1>
  <div class="catalog">
    {% for car in cars %}
      <div class="item">
        <img src="{{ car.photo.url }}" width="200">
        <h3>{{ car.brand.name }} {{ car.model_name }}</h3>
        <p>Цена: {{ car.price }} сом</p>
        <a href="{% url 'car_detail' car.id %}">Подробнее</a>
      </div>
    {% endfor %}
  </div>
{% endblock %}
